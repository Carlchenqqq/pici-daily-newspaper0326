    function initHistoryChart(chartData, deathAnalysis, type) {
        const ctx = document.getElementById('historyChart');
        if (!ctx) return;

        if (currentHistoryChart) {
            currentHistoryChart.destroy();
        }

        const dates = chartData?.dates || [];
        const unitColors = ['#2563eb', '#059669', '#7c3aed', '#ea580c', '#0891b2', '#db2777', '#65a30d', '#f59e0b'];
        const typeMap = { temp: 'temperature', humi: 'humidity', co2: 'co2', pressure: 'pressure', vent: 'ventilation' };
        const dataKey = typeMap[type];
        const typeData = dataKey ? (chartData?.[dataKey] || {}) : {};
        const unitNames = typeData.units ? Object.keys(typeData.units) : [];
        let datasets = [];
        let title = '';
        let yLabel = '';
        let unitSuffix = '';

        if (type === 'temp') {
            title = '温度历史趋势';
            yLabel = '温度 (℃)';
            unitSuffix = '℃';
            unitNames.forEach((unit, idx) => {
                datasets.push({
                    label: getUnitDisplayName(unit),
                    data: typeData.units[unit] || [],
                    borderColor: unitColors[idx % unitColors.length],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            });
            if (chartData?.temperature?.outdoor) {
                datasets.push({
                    label: '舍外温度',
                    data: chartData.temperature.outdoor,
                    borderColor: '#94a3b8',
                    borderDash: [5, 5],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            }
            if (chartData?.temperature?.target?.some(v => v != null)) {
                const targets = chartData.temperature.target || [];
                const upperTargets = targets.map(value => value != null ? value + 3 : null);
                const lowerTargets = targets.map(value => value != null ? value - 3 : null);
                datasets.push({
                    label: '目标温度',
                    data: targets,
                    borderColor: '#10b981',
                    borderDash: [3, 3],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
                datasets.push({
                    label: '目标区间上限',
                    data: upperTargets,
                    borderColor: 'rgba(16,185,129,0.28)',
                    borderDash: [3, 3],
                    tension: 0.4,
                    pointRadius: 0,
                    fill: '-1',
                    backgroundColor: 'rgba(16,185,129,0.10)'
                });
                datasets.push({
                    label: '目标区间下限',
                    data: lowerTargets,
                    borderColor: 'rgba(16,185,129,0.28)',
                    borderDash: [3, 3],
                    tension: 0.4,
                    pointRadius: 0,
                    fill: false
                });
            }
        } else if (type === 'humi') {
            title = '湿度历史趋势';
            yLabel = '湿度 (%)';
            unitSuffix = '%';
            unitNames.forEach((unit, idx) => {
                datasets.push({
                    label: getUnitDisplayName(unit),
                    data: typeData.units[unit] || [],
                    borderColor: unitColors[idx % unitColors.length],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            });
        } else if (type === 'co2') {
            title = 'CO2 历史趋势';
            yLabel = 'CO2 (ppm)';
            unitSuffix = ' ppm';
            unitNames.forEach((unit, idx) => {
                datasets.push({
                    label: getUnitDisplayName(unit),
                    data: typeData.units[unit] || [],
                    borderColor: unitColors[idx % unitColors.length],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            });
            datasets.push({
                label: '达标线',
                data: Array(dates.length).fill(3000),
                borderColor: '#ef4444',
                borderDash: [5, 5],
                pointRadius: 0,
                pointHoverRadius: 4
            });
        } else if (type === 'pressure') {
            title = '压差历史趋势';
            yLabel = '压差 (Pa)';
            unitSuffix = ' Pa';
            unitNames.forEach((unit, idx) => {
                datasets.push({
                    label: getUnitDisplayName(unit),
                    data: typeData.units[unit] || [],
                    borderColor: unitColors[idx % unitColors.length],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            });
            datasets.push({
                label: '0Pa基准',
                data: Array(dates.length).fill(0),
                borderColor: '#ef4444',
                borderDash: [5, 5],
                pointRadius: 0,
                pointHoverRadius: 4
            });
        } else if (type === 'vent') {
            title = '通风等级趋势';
            yLabel = '通风等级';
            unitSuffix = '';
            unitNames.forEach((unit, idx) => {
                datasets.push({
                    label: getUnitDisplayName(unit),
                    data: typeData.units[unit] || [],
                    borderColor: unitColors[idx % unitColors.length],
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4
                });
            });
        } else if (type === 'death') {
            title = '累计死亡趋势';
            yLabel = '死亡数 (头)';
            unitSuffix = ' 头';
            const deathTrend = deathAnalysis?.cumulative_trend || [];
            datasets = [
                {
                    label: '累计死亡',
                    data: deathTrend.map(d => d.cumulative),
                    borderColor: '#dc2626',
                    backgroundColor: 'rgba(220,38,38,0.1)',
                    tension: 0.4,
                    fill: true
                },
                {
                    label: '当日死亡',
                    data: deathTrend.map(d => d.daily),
                    borderColor: '#ea580c',
                    type: 'bar',
                    backgroundColor: 'rgba(234,88,12,0.5)'
                }
            ];
        }

        currentHistoryChart = new Chart(ctx, {
            type: 'line',
            data: { labels: dates, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    title: { display: true, text: title, font: { size: 14, weight: '600' } },
                    legend: { position: 'top', labels: { usePointStyle: true, padding: 15 } },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            title: function(context) {
                                const date = context[0]?.label || '';
                                const deathCount = deathAnalysis?.daily_deaths?.[date] || 0;
                                const deathInfo = deathCount > 0 ? ` | 当日死亡: ${deathCount}头` : '';
                                return `${date}${deathInfo}`;
                            },
                            label: function(context) {
                                const label = context.dataset.label || '';
                                if (context.parsed.y == null) return label;
                                if (type === 'temp') {
                                    const date = dates[context.dataIndex];
                                    const dailySummary = historicalData?.daily_summaries?.find(d => d.date === date);
                                    const tempValue = context.parsed.y.toFixed(1);

                                    if (label === '舍外温度') {
                                        const avg = context.parsed.y;
                                        const min = dailySummary?.outdoor_temp_min;
                                        const max = dailySummary?.outdoor_temp_max;
                                        if (min != null && max != null) {
                                            return `${label}: ${tempValue}℃ (${min}℃-${max}℃)`;
                                        }
                                        return `${label}: ${tempValue}℃`;
                                    }

                                    if (label === '目标温度') {
                                        const avg = context.parsed.y;
                                        return `${label}: ${tempValue}℃ (${(avg - 3).toFixed(1)}℃-${(avg + 3).toFixed(1)}℃)`;
                                    }

                                    if (label.includes('目标区间')) {
                                        return '';
                                    }

                                    const unit = label.replace('保育 ', '').replace('育肥 ', '').replace('单元 ', '');
                                    const unitDetail = dailySummary?.unit_details?.[unit];
                                    const temp = unitDetail?.temperature;
                                    if (temp) {
                                        return `${label}: ${tempValue}℃ (${temp.min ?? '-'}℃-${temp.max ?? '-'}℃)`;
                                    }
                                }

                                return `${label}: ${context.parsed.y}${unitSuffix}`;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        title: { display: true, text: yLabel },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { maxTicksLimit: 10 }
                    }
                }
            }
        });
    }

    window.onload = async function() {
        const batchSelect = document.getElementById('batchSelect');
        if (batchSelect && batchSelect.options.length > 0 && !batchSelect.value) {

        }

        if (batchSearch) {
            batchSearch.placeholder = '输入批次名称筛选';
            batchSearch.addEventListener('input', filterBatchOptions);
        }
        const analyzeBtn = document.getElementById('analyzeBtn');
        if (analyzeBtn) analyzeBtn.textContent = '分析';
        const historicalBtn = document.getElementById('historicalBtn');
        if (historicalBtn) historicalBtn.textContent = '历史分析';
        toggleAnalysisMode();
        
        // 初始化日期范围并加载数据
        await handleBatchChange();
    };
