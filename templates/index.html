<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批次环控深度分析报表</title>
    <meta name="description" content="育肥猪批次环境控制与设备运行深度分析报表，以批次维度进行环控数据与生产成绩关联分析">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #faf8f5;
            --bg-card: #ffffff;
            --bg-card-alt: #f5f2ed;
            --bg-hover: #ebe7e0;
            --bg-input: #ffffff;
            --text: #1a1612;
            --text-secondary: #5c5347;
            --text-muted: #9c9184;
            --border: #e5dfd5;
            --border-light: #d4ccc0;
            --accent: #2d6a4f;
            --accent-light: #40916c;
            --accent-glow: rgba(45, 106, 79, 0.3);
            --green: #2d6a4f;
            --green-light: #40916c;
            --green-bg: rgba(45, 106, 79, 0.08);
            --green-bg-hover: rgba(45, 106, 79, 0.15);
            --red: #c1121f;
            --red-bg: rgba(193, 18, 31, 0.08);
            --orange: #e07a2f;
            --orange-bg: rgba(224, 122, 47, 0.08);
            --yellow: #d4a03c;
            --yellow-bg: rgba(212, 160, 60, 0.08);
            --purple: #6b5b95;
            --purple-bg: rgba(107, 91, 149, 0.08);
            --amber: #b8860b;
            --amber-bg: rgba(184, 134, 11, 0.08);
            --shadow: 0 2px 12px rgba(26, 22, 18, 0.06);
            --shadow-md: 0 4px 20px rgba(26, 22, 18, 0.08);
            --shadow-lg: 0 8px 40px rgba(26, 22, 18, 0.12);
            --shadow-glow: 0 0 24px var(--accent-glow);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
        }
        
        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            min-height: 100vh;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        
        /* Header */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.92);
        }
        
        .header-left { display: flex; align-items: center; gap: 24px; }
        
        .logo {
            font-size: 17px;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.4px;
        }
        
        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, var(--accent), var(--green-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        
        .header-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
        }
        
        .header-batch-info {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .header-batch-info strong {
            color: var(--text);
            font-weight: 600;
        }
        
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .form-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        select, input[type="date"] {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 14px;
            background: var(--bg-input);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            font-weight: 400;
        }
        
        select:focus, input[type="date"]:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .btn {
            padding: 8px 20px;
            background: linear-gradient(145deg, var(--accent), var(--accent-light));
            color: #fff;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        
        .btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        /* Container */
        .container {
            max-width: 1480px;
            margin: 0 auto;
            padding: 32px 40px;
        }
        
        /* Section */
        .section { margin-bottom: 24px; }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        
        .section-title-bar {
            width: 4px;
            height: 20px;
            border-radius: 3px;
        }
        
        .section-title-bar.blue { background: var(--accent); }
        .section-title-bar.red { background: var(--red); }
        .section-title-bar.green { background: var(--green); }
        .section-title-bar.orange { background: var(--orange); }
        .section-title-bar.purple { background: var(--purple); }
        .section-title-bar.amber { background: var(--amber); }
        
        .section-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        
        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card-alt);
        }
        
        .card-body { padding: 16px; }
        
        /* Grid layouts */
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
        .grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; }

        /* KPI Cards */
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        .kpi-card:hover::before {
            opacity: 1;
        }

        .kpi-card .kpi-actions {
            margin-top: auto;
            padding-top: 12px;
        }

        .btn-edit {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        
        .kpi-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .kpi-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
            letter-spacing: -1.5px;
            font-variant-numeric: tabular-nums;
        }
        
        .kpi-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 400;
        }
        
        .kpi-value.danger { color: var(--red); }
        .kpi-value.warning { color: var(--orange); }
        .kpi-value.good { color: var(--green); }
        
        /* Risk Badge */
        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        
        .risk-badge.high { background: var(--red-bg); color: var(--red); border: 1px solid rgba(193, 18, 31, 0.15); }
        .risk-badge.medium { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(224, 122, 47, 0.15); }
        .risk-badge.low { background: var(--green-bg); color: var(--green); border: 1px solid rgba(45, 106, 79, 0.15); }
        
        .risk-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        
        .risk-dot.high { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .risk-dot.medium { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .risk-dot.low { background: var(--green); box-shadow: 0 0 8px var(--green); }
        
        /* Anomaly Items */
        .anomaly-card {
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            border-left: 4px solid;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: all 0.2s;
        }
        
        .anomaly-card:hover {
            transform: translateX(4px);
        }
        
        .anomaly-card.high { background: var(--red-bg); border-left-color: var(--red); }
        .anomaly-card.medium { background: var(--orange-bg); border-left-color: var(--orange); }
        .anomaly-card.low { background: var(--yellow-bg); border-left-color: var(--yellow); }
        
        .anomaly-content { flex: 1; }
        
        .anomaly-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .anomaly-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .anomaly-impact {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-style: italic;
        }
        
        .anomaly-meta {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            align-items: center;
        }
        
        .anomaly-unit-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .anomaly-severity {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .anomaly-severity.high { color: var(--red); }
        .anomaly-severity.medium { color: var(--orange); }
        
        /* Unit Cards */
        .unit-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        
        .unit-card:hover { 
            border-color: var(--border-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .unit-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card-alt);
        }
        
        .unit-name-group { display: flex; align-items: center; gap: 10px; }
        
        .unit-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        
        .unit-pig-info {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .unit-body { padding: 20px; }
        
        .unit-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }
        
        .unit-metric {
            padding: 12px 14px;
            background: var(--bg-card-alt);
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .unit-metric:hover {
            border-color: var(--accent);
            background: var(--green-bg);
        }
        
        .unit-metric-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        
        .unit-metric-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }
        
        .unit-metric-value.good { color: var(--green); }
        .unit-metric-value.warn { color: var(--orange); }
        .unit-metric-value.bad { color: var(--red); }
        
        .unit-metric-sub {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Fan bars */
        .fan-bar-group { margin-top: 12px; }
        
        .fan-bar-label {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .fan-bar-track {
            height: 6px;
            background: var(--bg-card-alt);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .fan-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        /* Death indicator */
        .death-indicator {
            margin-top: 12px;
            padding: 10px 12px;
            background: var(--red-bg);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-sm);
        }
        
        .death-indicator-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--red);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .death-indicator-detail {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Sensor health */
        .sensor-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        
        .sensor-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .sensor-dot.online { background: var(--green); box-shadow: 0 0 4px var(--green); }
        .sensor-dot.offline { background: var(--red); box-shadow: 0 0 4px var(--red); }
        .sensor-dot.missing { background: var(--text-muted); }
        
        .sensor-label {
            font-size: 10px;
            color: var(--text-muted);
        }
        
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            border-bottom: 2px solid var(--border);
            background: var(--bg-card-alt);
        }
        
        .data-table td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        
        .data-table tbody tr {
            transition: background 0.15s;
        }
        
        .data-table tbody tr:hover td {
            background: var(--bg-hover);
        }

        .data-table tbody tr.summary-row td {
            background: var(--bg-card-alt);
            font-weight: 600;
            border-top: 2px solid var(--border);
        }

        .data-table tbody tr.summary-row:hover td {
            background: var(--bg-hover);
        }

        .data-table tbody tr.best-row td {
            background: rgba(45, 106, 79, 0.08);
        }

        .data-table tbody tr.best-row:hover td {
            background: rgba(45, 106, 79, 0.15);
        }

        .data-table tbody tr.worst-row td {
            background: rgba(193, 18, 31, 0.06);
        }

        .data-table tbody tr.worst-row:hover td {
            background: rgba(193, 18, 31, 0.12);
        }

        .subtle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }
        
        /* Recommendation cards */
        .rec-card {
            padding: 14px 16px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
        }
        
        .rec-priority {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            flex-shrink: 0;
        }
        
        .rec-priority.high { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
        .rec-priority.medium { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
        .rec-priority.low { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
        
        .rec-content { flex: 1; }
        
        .rec-action {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .rec-detail {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .rec-effect {
            font-size: 11px;
            color: var(--green);
            margin-top: 4px;
        }
        
        .rec-category-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-muted);
            margin-right: 6px;
        }
        
        /* Chart container */
        .chart-wrapper {
            position: relative;
            height: 320px;
        }
        
        .chart-tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            width: fit-content;
        }
        
        .chart-tab {
            padding: 5px 14px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        
        .chart-tab.active {
            background: var(--accent);
            color: #fff;
        }
        
        .chart-tab:hover:not(.active) {
            color: var(--text);
            background: var(--bg-card-alt);
        }
        
        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 16px;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        /* Empty / Error */
        .error-box {
            padding: 24px;
            text-align: center;
            color: var(--red);
            background: var(--red-bg);
            border-radius: var(--radius);
            border: 1px solid rgba(239,68,68,0.2);
        }
        
        /* Tab navigation */
        .nav-tabs {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 28px;
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        .nav-tab {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            position: relative;
            bottom: -2px;
        }
        
        .nav-tab:hover { color: var(--text); }
        
        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Progress bar for risk score */
        .risk-score-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .risk-score-track {
            flex: 1;
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .risk-score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }
        
        .risk-score-value {
            font-size: 14px;
            font-weight: 800;
            min-width: 36px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        
        /* Unit risk card clickable */
        .unit-risk-card {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        
        .unit-risk-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .unit-risk-card.active {
            border-color: var(--accent);
            background: var(--bg-hover);
        }
        
        /* Comparison highlight */
        .highlight-best { color: var(--green) !important; }
        .highlight-worst { color: var(--red) !important; }
        
        /* Print optimization */
        @media print {
            .header { position: relative; }
            .btn, .nav-tabs { display: none; }
            .tab-content { display: block !important; }
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .grid-5 { grid-template-columns: repeat(3, 1fr); }
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .grid-5, .grid-4, .grid-3, .grid-2, .grid-2-1, .grid-1-2 { grid-template-columns: 1fr; }
            .header { padding: 0 16px; flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 8px; }
            .header-right { flex-wrap: wrap; }
        }
        
        /* Tooltip */
        .info-tip {
            position: relative;
            cursor: help;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        /* Correlation card */
        .correlation-card {
            padding: 14px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
        }
        
        .correlation-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .correlation-unit {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }
        
        .correlation-assessment {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            padding: 8px 12px;
            background: var(--bg);
            border-radius: var(--radius-xs);
            margin-top: 8px;
        }
        
        .env-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-muted);
            margin: 2px 2px 2px 0;
        }

        .search-input {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 13px;
            background: var(--bg-input);
            color: var(--text);
            min-width: 220px;
        }

        .fact-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .fact-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
        }

        .fact-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .fact-value {
            font-size: 22px;
            line-height: 1.1;
            font-weight: 800;
            color: var(--text);
        }

        .fact-sub {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .note-card {
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
        }

        .note-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .note-list {
            display: grid;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chip.good {
            background: var(--green-bg);
            color: var(--green);
        }

        .chip.warn {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .chip.bad {
            background: var(--red-bg);
            color: var(--red);
        }

        .metric-table-wrap {
            overflow-x: auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .metric-pill {
            display: inline-block;
            min-width: 68px;
            text-align: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--bg-card-alt);
            font-size: 12px;
            font-weight: 700;
        }

        .metric-pill.good {
            background: var(--green-bg);
            color: var(--green);
        }

        .metric-pill.warn {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .metric-pill.bad {
            background: var(--red-bg);
            color: var(--red);
        }

        .delta-text {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .delta-text.strong {
            color: var(--red);
            font-weight: 700;
        }

        .weak-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--red-bg);
            color: var(--red);
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .timeline-list {
            display: grid;
            gap: 10px;
        }

        .timeline-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
        }

        .timeline-item strong {
            color: var(--text);
        }

        .subtle {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* ========== 横向对比模式样式 ========== */

        /* 对比批次卡片 */
        .comparison-batch-cards {
            display: flex;
            align-items: stretch;
            gap: 20px;
            margin-bottom: 24px;
        }

        .comparison-batch-card {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .comparison-batch-card.batch-a {
            border-top: 4px solid var(--green);
        }

        .comparison-batch-card.batch-b {
            border-top: 4px solid var(--orange);
        }

        .comparison-batch-header {
            padding: 16px 20px;
            background: var(--bg-card-alt);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .comparison-batch-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .batch-a-badge {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid rgba(45, 106, 79, 0.2);
        }

        .batch-b-badge {
            background: var(--orange-bg);
            color: var(--orange);
            border: 1px solid rgba(224, 122, 47, 0.2);
        }

        .comparison-batch-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .comparison-batch-info {
            padding: 16px 20px;
        }

        .comparison-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .comparison-info-row:last-child {
            border-bottom: none;
        }

        .comparison-info-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .comparison-info-value {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
        }

        .comparison-vs {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-muted);
            background: var(--bg-card-alt);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* 对比指标卡片网格 */
        .comparison-metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .comparison-metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .comparison-metric-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .comparison-metric-icon {
            font-size: 20px;
        }

        .comparison-metric-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .comparison-metric-values {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .comparison-metric-value {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .metric-number {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .metric-unit {
            font-size: 12px;
            color: var(--text-muted);
        }

        .batch-a-value .metric-number {
            color: var(--green);
        }

        .batch-b-value .metric-number {
            color: var(--orange);
        }

        .comparison-metric-diff {
            text-align: center;
        }

        .diff-better {
            color: var(--green);
            font-weight: 700;
            font-size: 14px;
        }

        .diff-worse {
            color: var(--orange);
            font-weight: 700;
            font-size: 14px;
        }

        .diff-neutral {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
        }

        .comparison-metric-detail {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        /* 阶段筛选按钮 */
        .comparison-stage-filter {
            display: flex;
            gap: 8px;
        }

        .stage-filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
        }

        .stage-filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .stage-filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* 单元对比表格 */
        .comparison-units-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .comparison-units-group {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .comparison-units-group-title {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            background: var(--bg-card-alt);
            border-bottom: 1px solid var(--border);
        }

        .comparison-units-table-wrap {
            overflow-x: auto;
        }

        .comparison-units-table {
            min-width: 800px;
        }

        .comparison-unit-row {
            background: var(--bg-card-alt) !important;
        }

        .comparison-unit-row:hover td {
            background: var(--bg-card-alt) !important;
        }

        .comparison-unit-name {
            font-weight: 700 !important;
            color: var(--text) !important;
            font-size: 13px !important;
        }

        .comparison-unit-batch-a td {
            background: rgba(45, 106, 79, 0.04) !important;
        }

        .comparison-unit-batch-b td {
            background: rgba(224, 122, 47, 0.04) !important;
        }

        .batch-tag {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            line-height: 20px;
        }

        .batch-a-tag {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid rgba(45, 106, 79, 0.2);
        }

        .batch-b-tag {
            background: var(--orange-bg);
            color: var(--orange);
            border: 1px solid rgba(224, 122, 47, 0.2);
        }

        /* 趋势对比图表 */
        .comparison-chart-tabs {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 16px;
        }

        .comparison-chart-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 16px;
            height: 4px;
            border-radius: 2px;
        }

        .batch-a-color {
            background: var(--green);
        }

        .batch-b-color {
            background: var(--orange);
        }

        .comparison-chart-wrapper {
            height: 400px;
        }

        /* 死亡分析对比卡片 */
        .comparison-death-cards {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        .comparison-death-card {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .comparison-death-card.batch-a {
            border-top: 4px solid var(--green);
        }

        .comparison-death-card.batch-b {
            border-top: 4px solid var(--orange);
        }

        .comparison-death-header {
            padding: 16px 20px;
            background: var(--bg-card-alt);
            border-bottom: 1px solid var(--border);
        }

        .comparison-death-stats {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .comparison-death-stat {
            text-align: center;
            padding: 12px;
            background: var(--bg-card-alt);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .comparison-death-stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .comparison-death-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        .comparison-death-diff {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
            padding: 20px;
            background: var(--purple-bg);
            border-radius: var(--radius);
            border: 1px solid rgba(107, 91, 149, 0.2);
        }

        .comparison-death-diff-item {
            text-align: center;
        }

        .diff-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .diff-value {
            font-size: 20px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .text-danger {
            color: var(--red);
        }

        .text-success {
            color: var(--green);
        }

        /* 响应式布局 */
        @media (max-width: 1200px) {
            .comparison-metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 900px) {
            .comparison-batch-cards {
                flex-direction: column;
            }

            .comparison-vs {
                width: 100%;
                height: 40px;
            }

            .comparison-death-cards {
                flex-direction: column;
            }

            .comparison-death-diff {
                order: -1;
            }
        }

        @media (max-width: 600px) {
            .comparison-metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">&#x1F4CA;</div>
                <span>批次环控深度分析</span>
            </div>
        </div>
        <div class="header-right">
            <div class="form-group">
                <label>分析模式</label>
                <select id="analysisMode" onchange="toggleAnalysisMode()">
                    <option value="daily">单日分析</option>
                    <option value="historical" selected>历史趋势</option>
                    <option value="comparison">横向对比</option>
                </select>
            </div>
            <!-- 横向对比模式：批次A选择 -->
            <div class="form-group" id="comparisonBatchAGroup" style="display:none;">
                <label>批次 A</label>
                <select id="comparisonBatchA">
                    {% for batch in batches %}
                    <option value="{{ batch.batch_id }}">{{ batch.batch_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- 横向对比模式：批次B选择 -->
            <div class="form-group" id="comparisonBatchBGroup" style="display:none;">
                <label>批次 B</label>
                <select id="comparisonBatchB">
                    {% for batch in batches %}
                    <option value="{{ batch.batch_id }}">{{ batch.batch_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button class="btn" id="comparisonBtn" onclick="loadComparisonReport()" style="display:none;background:var(--orange);">开始对比</button>
            <!-- 历史分析模式：批次选择 -->
            <div class="form-group" id="batchSelectGroup">
                <label>批次</label>
                <input id="batchSearch" class="search-input" type="text" placeholder="输入批次名称筛选" oninput="filterBatchOptions()" style="display:none !important; margin-right:8px;">
                <select id="batchSelect" onchange="handleBatchChange()">
                    {% for batch in batches %}
                    <option value="{{ batch.batch_id }}">{{ batch.batch_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group" id="dateGroup" style="display:none;">
                <label>日期</label>
                <input type="date" id="dateInput" value="2026-03-10">
            </div>
            <div class="form-group" id="dateRangeGroup">
                <label>日期</label>
                <input type="date" id="customStartDate">
                <span style="color: var(--text-muted);">至</span>
                <input type="date" id="customEndDate">
            </div>
            <button class="btn" id="analyzeBtn" onclick="loadReport()">分析</button>
            <button class="btn" id="historicalBtn" onclick="loadHistoricalReport()" style="display:none;background:var(--purple);">历史分析</button>
        </div>
    </header>

    <main class="container">
        <div id="reportContent">
            <div class="loading">
                <div class="spinner"></div>
                <div class="loading-text">正在加载批次数据并生成深度分析报告...</div>
            </div>
        </div>
    </main>

    <script>
    let charts = {};
    let reportData = null;
    let selectedUnitFilter = null;
    let historicalData = null;
    let currentHistoryChart = null;
    let currentHistoryChartType = 'temp';
    
    // Get display name for unit (e.g., "保育舍4-1" or "育肥舍4-1")
    function getUnitDisplayName(unit, unitType) {
        if (!unitType) {
            if (reportData && reportData.unit_types) {
                unitType = reportData.unit_types[unit];
            } else if (historicalData && historicalData.unit_evaluation && historicalData.unit_evaluation.units) {
                const found = historicalData.unit_evaluation.units.find(u => u.unit === unit);
                if (found) unitType = found.unit_type;
            }
        }
        if (unitType && unitType.toLowerCase().startsWith('baoyu')) {
            return '保育舍' + unit;
        }
        return '育肥舍' + unit;
    }
    
    // Toggle between daily and historical analysis mode
    function toggleAnalysisMode() {
        const mode = document.getElementById('analysisMode').value;
        const dateGroup = document.getElementById('dateGroup');
        const dateRangeGroup = document.getElementById('dateRangeGroup');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const historicalBtn = document.getElementById('historicalBtn');
        const comparisonBtn = document.getElementById('comparisonBtn');
        const comparisonBatchAGroup = document.getElementById('comparisonBatchAGroup');
        const comparisonBatchBGroup = document.getElementById('comparisonBatchBGroup');
        const batchSelectGroup = document.getElementById('batchSelectGroup');

        if (mode === 'historical') {
            dateGroup.style.display = 'none';
            dateRangeGroup.style.display = '';
            analyzeBtn.style.display = 'none';
            historicalBtn.style.display = '';
            comparisonBtn.style.display = 'none';
            comparisonBatchAGroup.style.display = 'none';
            comparisonBatchBGroup.style.display = 'none';
            batchSelectGroup.style.display = '';
        } else if (mode === 'comparison') {
            dateGroup.style.display = 'none';
            dateRangeGroup.style.display = 'none';
            analyzeBtn.style.display = 'none';
            historicalBtn.style.display = 'none';
            comparisonBtn.style.display = '';
            comparisonBatchAGroup.style.display = '';
            comparisonBatchBGroup.style.display = '';
            batchSelectGroup.style.display = 'none';
        } else {
            dateGroup.style.display = '';
            dateRangeGroup.style.display = 'none';
            analyzeBtn.style.display = '';

    async function saveBatchField(field, value) {
        const batchId = document.getElementById('batchSelect')?.value;
        if (!batchId) return;
        
        try {
            const resp = await fetch('/api/batch/update-field', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({batch_id: batchId, field: field, value: value})
            });
            const result = await resp.json();
            if (result.success) {
                window.currentBatchInfo = window.currentBatchInfo || {};
                window.currentBatchInfo[field] = value;
                if (field === 'feeding_count') {
                    document.getElementById('feedingCountDisplay').innerHTML = `${value}<span style="font-size:14px;color:var(--text-muted);font-weight:400;"> 头</span>`;

                    document.getElementById('feedRatioDisplay').innerHTML = `${value}<span style="font-size:14px;color:var(--text-muted);font-weight:400;"></span>`;
                } else if (field === 'qualified_rate') {
                    document.getElementById('qualifiedRateDisplay').innerHTML = `${value}<span style="font-size:14px;color:var(--text-muted);font-weight:400;">%</span>`;
                }
            } else {
                alert('保存失败: ' + result.message);
            }
        } catch (e) {
            alert('保存失败: ' + e.message);
        }
    }

    // ========== 横向对比模式 ==========

    // 横向对比数据缓存
    let comparisonCache = {
        dataA: null,
        dataB: null,

        batchIdB: null
    };

    // 横向对比阶段筛选
    let comparisonStageFilter = 'all'; // 'all', 'baoyu', 'yufei'

    /**
     * localStorage 缓存策略
     * 1. 缓存键格式: historical_report_{batch_id}
     * 2. 缓存数据结构: { data: {...}, timestamp: number }
     * 3. 缓存有效期: 30分钟
     * 4. 读取优先级: localStorage -> API
     */
    function getHistoricalReportCacheKey(batchId) {
        return `historical_report_${batchId}`;
    }

    function getHistoricalReportFromCache(batchId) {
        try {
            const cacheKey = getHistoricalReportCacheKey(batchId);
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                const { data, timestamp } = JSON.parse(cached);
                const cacheAge = Date.now() - timestamp;
                const CACHE_DURATION = 30 * 60 * 1000; // 30分钟
                if (cacheAge < CACHE_DURATION) {
                    console.log(`[缓存命中] 批次 ${batchId}，缓存年龄: ${Math.round(cacheAge / 1000)}秒`);
                    return data;
                } else {
                    console.log(`[缓存过期] 批次 ${batchId}，缓存年龄: ${Math.round(cacheAge / 1000)}秒`);
                    localStorage.removeItem(cacheKey);
                }
            }
        } catch (e) {
            console.warn('[缓存读取失败]', e);
        }
        return null;
    }

    function setHistoricalReportToCache(batchId, data) {
        try {
            const cacheKey = getHistoricalReportCacheKey(batchId);
            const cacheData = {
                data: data,
                timestamp: Date.now()
            };
            localStorage.setItem(cacheKey, JSON.stringify(cacheData));
            console.log(`[缓存写入] 批次 ${batchId}`);
        } catch (e) {
            console.warn('[缓存写入失败]', e);
        }
    }

    // 渲染单元对比

                            <td>${bestHumiRate !== -Infinity ? bestHumiRate + '%' : '-'}</td>
                            <td style="border-left: 2px solid var(--border);"></td>
                            <td style="font-weight:700;color:var(--green);">最佳</td>
                            <td>${bestTempRate !== -Infinity ? bestTempRate + '%' : '-'}</td>
                            <td>-</td>
                            <td>${bestPressureRate !== -Infinity ? bestPressureRate + '%' : '-'}</td>
                            <td>${bestCo2Rate !== -Infinity ? bestCo2Rate + '%' : '-'}</td>
                            <td>${bestHumiRate !== -Infinity ? bestHumiRate + '%' : '-'}</td>

    function initComparisonTrendCharts(dataA, dataB) {
        const ctx = document.getElementById('comparisonTrendChart');
        if (!ctx) return;

        const trendDataA = dataA.trend_data || {};
        const trendDataB = dataB.trend_data || {};
        const batchInfoA = dataA.batch_info || {};
        const batchInfoB = dataB.batch_info || {};
        const unitTypesA = batchInfoA.unit_types || {};
        const unitTypesB = batchInfoB.unit_types || {};
        const dailySummariesA = dataA.daily_summaries || [];
        const dailySummariesB = dataB.daily_summaries || {};

        const dateToDayAgeA = {};
        dailySummariesA.forEach(d => { if (d.date && d.day_age != null) dateToDayAgeA[d.date] = d.day_age; });
        const dateToDayAgeB = {};
        dailySummariesB.forEach(d => { if (d.date && d.day_age != null) dateToDayAgeB[d.date] = d.day_age; });

        const dayAgesA = [...new Set(Object.values(dateToDayAgeA))].sort((a, b) => a - b);
        const dayAgesB = [...new Set(Object.values(dateToDayAgeB))].sort((a, b) => a - b);
        const commonDayAges = [...new Set([...dayAgesA, ...dayAgesB])].sort((a, b) => a - b);

        const dayAgeToDateA = {};
        dailySummariesA.forEach(d => { if (d.date && d.day_age != null) dayAgeToDateA[d.day_age] = d.date; });
        const dayAgeToDateB = {};
        dailySummariesB.forEach(d => { if (d.date && d.day_age != null) dayAgeToDateB[d.day_age] = d.date; });

        const batchNameA = dataA.batch_info?.batch_name || dataA.batch_info?.batch_id || '批次A';
        const batchNameB = dataB.batch_info?.batch_name || dataB.batch_info?.batch_id || '批次B';

        const unitsA = (batchInfoA.units || []).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
        const unitsB = (batchInfoB.units || []).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        const colorsA = [
            'rgba(45, 106, 79, 1)',
            'rgba(45, 106, 79, 0.7)',
            'rgba(45, 106, 79, 0.5)',
            'rgba(45, 106, 79, 0.3)'
        ];
        const colorsB = [
            'rgba(224, 122, 47, 1)',
            'rgba(224, 122, 47, 0.7)',
            'rgba(224, 122, 47, 0.5)',
            'rgba(224, 122, 47, 0.3)'
        ];

        function getUnitTrendData(trendData, dayAges, dayAgeToDate, type) {
            let typeData = null;
            switch (type) {
                case 'temp': typeData = trendData.temperature || {}; break;
                case 'humi': typeData = trendData.humidity || {}; break;
                case 'co2': typeData = trendData.co2 || {}; break;
                case 'pressure': typeData = trendData.pressure || {}; break;
            }
            if (!typeData || !typeData.units) return {};

            const result = {};
            Object.entries(typeData.units).forEach(([unit, values]) => {
                const data = dayAges.map(da => {
                    const date = dayAgeToDate[da];
                    if (!date) return undefined;
                    const trendDates = trendData.dates || [];
                    const idx = trendDates.indexOf(date);
                    return idx >= 0 ? values[idx] : undefined;
                });
                result[unit] = data;
            });
            return result;
        }

        const unitDataA = getUnitTrendData(trendDataA, commonDayAges, dayAgeToDateA, currentComparisonChartType);
        const unitDataB = getUnitTrendData(trendDataB, commonDayAges, dayAgeToDateB, currentComparisonChartType);

        const datasets = [];
        let colorIdx = 0;

        unitsA.forEach(unit => {
            if (unitDataA[unit]) {
                datasets.push({
                    label: `${batchNameA} - ${unit}`,

                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    spanGaps: false
                });

        colorIdx = 0;
        unitsB.forEach(unit => {
            if (unitDataB[unit]) {
                datasets.push({
                    label: `${batchNameB} - ${unit}`,
                    data: unitDataB[unit],
                    borderColor: colorsB[colorIdx % colorsB.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 4,

            temp: { yLabel: '温度 (℃)' },
            humi: { yLabel: '湿度 (%)' },
            co2: { yLabel: 'CO2 (ppm)' },
            pressure: { yLabel: '压差 (Pa)' }
        };
        const config = metricLabels[currentComparisonChartType] || metricLabels.temp;

        comparisonChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: commonDayAges,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: {
                            boxWidth: 20,
                            padding: 10,
                            font: { size: 10 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: ${context.parsed.y !== null ? context.parsed.y.toFixed(1) : '-'}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },

                        beginAtZero: false,
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        title: { display: true, text: config.yLabel }
                    }
                }
            }
        });
    }

    function getTrendDataForChart(trendData, type, dates) {
        if (!trendData) return { dates: [], values: [], batchName: '' };

        let typeData = null;
        switch (type) {
            case 'temp':
                typeData = trendData.temperature || {};
                break;
            case 'humi':
                typeData = trendData.humidity || {};
                break;
            case 'co2':
                typeData = trendData.co2 || {};
                break;
            case 'pressure':
                typeData = trendData.pressure || {};
                break;
        }

        if (!typeData) return { dates: [], values: [], batchName: '' };

        const trendDates = trendData.dates || [];
        let sourceData = [];

        if (typeData.units && typeof typeData.units === 'object') {
            const unitKeys = Object.keys(typeData.units);
            if (unitKeys.length > 0) {
                const firstUnitData = typeData.units[unitKeys[0]] || [];
                sourceData = firstUnitData;
            }
        } else if (Array.isArray(typeData)) {
            sourceData = typeData;
        }

        const values = dates.map(date => {
            const index = trendDates.indexOf(date);
            return index >= 0 ? sourceData[index] : null;
        });

        return { dates, values, batchName: '' };
    }

    // 渲染每日汇总对比
    function renderComparisonDaily(dataA, dataB) {
        const dailySummariesA = dataA.daily_summaries || [];
        const dailySummariesB = dataB.daily_summaries || [];
        const batchInfoA = dataA.batch_info || {};
        const batchInfoB = dataB.batch_info || {};

        const unitTypesB = batchInfoB.unit_types || {};

        }

        const dayAgeToDateA = {};
        dailySummariesA.forEach(d => { if (d.date && d.day_age != null) dayAgeToDateA[d.day_age] = d.date; });
        const dayAgeToDateB = {};
        dailySummariesB.forEach(d => { if (d.date && d.day_age != null) dayAgeToDateB[d.day_age] = d.date; });

        const batchNameA = dataA.batch_info?.batch_name || dataA.batch_info?.batch_id || '批次A';

            else if (type.startsWith('yufei')) unitsTypeA.yufei.push(u);

        unitsTypeA.baoyu.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
        unitsTypeA.yufei.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        const unitsTypeB = { baoyu: [], yufei: [] };
        allUnitsB.forEach(u => {
            const type = (unitTypesB[u] || '').toLowerCase();
            if (type.startsWith('baoyu')) unitsTypeB.baoyu.push(u);

        function getDayAgeSummary(dailySummaries, dayAge) {
            const date = dayAgeToDateA[dayAge] || dayAgeToDateB[dayAge];

            return dailySummaries.find(d => d.date === date) || null;

        function getComplianceColor(value) {
            if (value === null || value === undefined) return { bg: 'var(--bg)', color: 'var(--text-muted)' };

                unitsA.forEach(unit => {
                    metrics.forEach(m => {
                        const unitData = summaryA?.unit_details?.[unit]?.[m.key] || {};
                        const val = unitData.within_target_pct ?? null;
                        const colors = getComplianceColor(val);
                        sectionHtml += `<td style="text-align:center;padding:4px 2px;border:1px solid var(--border);background:${colors.bg};color:${colors.color};font-weight:600;font-size:11px;">${val !== null ? val + '%' : '-'}</td>`;
                    });
                });
                unitsB.forEach(unit => {
                    metrics.forEach(m => {
                        const unitData = summaryB?.unit_details?.[unit]?.[m.key] || {};
                        const val = unitData.within_target_pct ?? null;

                        sectionHtml += `<td style="text-align:center;padding:4px 2px;border:1px solid var(--border);background:${colors.bg};color:${colors.color};font-weight:600;font-size:11px;">${val !== null ? val + '%' : '-'}</td>`;
                    });

                sectionHtml += `</tr>`;
            });

            sectionHtml += `</tbody></table></div></div>`;
            return sectionHtml;
        };

        if (unitsTypeA.baoyu.length > 0 || unitsTypeB.baoyu.length > 0) {

        if (unitsTypeA.yufei.length > 0 || unitsTypeB.yufei.length > 0) {
            html += renderTypeSection(`育肥单元`, unitsTypeA.yufei, unitsTypeB.yufei, batchNameA, batchNameB);
        }

        html += `</section>`;
        return html;
    }

    // ========== 辅助函数 ==========

    // 计算差异值
    function calcDiff(valA, valB) {
        if (valA == null || valB == null) {
            return { text: '-', color: '' };
        }
        const diff = valA - valB;
        const sign = diff > 0 ? '+' : '';
        const abs = Math.abs(diff);
        return {
            text: `${sign}${abs.toFixed(1)}`,
            color: diff !== 0 ? (diff > 0 ? 'color:var(--orange);' : 'color:var(--green);') : ''
        };
    }

    // 格式化差异值显示
    function formatDiff(valA, valB, decimals, unit) {
        if (valA == null || valB == null) {
            return '<span class="diff-neutral">-</span>';
        }
        const diff = valA - valB;
        const sign = diff > 0 ? '+' : '';
        const abs = Math.abs(diff);
        const cls = diff > 0 ? 'diff-worse' : (diff < 0 ? 'diff-better' : 'diff-neutral');
        return `<span class="${cls}">${sign}${abs.toFixed(decimals)}${unit}</span>`;
    }

    function getDailyMetricSummary(units) {
        const avg = values => values.length ? values.reduce((sum, item) => sum + item, 0) / values.length : null;
        return {
            tempCompliance: avg(units.map(u => u.temperature?.within_target_pct).filter(v => v != null)),
            tempStability: avg(units.map(u => u.temperature?.std).filter(v => v != null)),
            pressureCompliance: avg(units.map(u => u.pressure?.within_target_pct).filter(v => v != null)),
            co2Compliance: avg(units.map(u => u.co2?.within_target_pct).filter(v => v != null)),
            humiCompliance: avg(units.map(u => u.humidity?.within_target_pct).filter(v => v != null))
        };
    }

        const avgTempCompliance = average('tempCompliance');
